# Prometheus Configuration for EU AI Act Compliance System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'eu-ai-act-monitor'

scrape_configs:
  # Backend API metrics
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ollama metrics (if available)
  #- job_name: 'ollama'
  #  static_configs:
  #    - targets: ['ollama:11434']
  #  metrics_path: '/metrics'

  # PostgreSQL exporter (optional - requires postgres_exporter)
