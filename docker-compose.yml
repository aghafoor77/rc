services:
  # ============================================================================
  # FastAPI Backend
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eu-ai-act-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - HYBRID_CONFIDENCE_THRESHOLD=${HYBRID_CONFIDENCE_THRESHOLD:-0.85}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eu_ai_act_db
      - POSTGRES_USER=ai_compliance_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_PERSIST_DIR=/app/data/vector_store
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - eu-ai-act-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Ollama (LLM Server) - Custom build with pre-loaded model
  # Model is baked into the image during build for instant startup
  # ============================================================================
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b}
    image: eu-ai-act-ollama:${OLLAMA_MODEL:-llama3-8b}
    container_name: eu-ai-act-ollama
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - eu-ai-act-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: eu-ai-act-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=eu_ai_act_db
      - POSTGRES_USER=ai_compliance_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - eu-ai-act-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_compliance_user -d eu_ai_act_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: eu-ai-act-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - eu-ai-act-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Celery Worker (Background Tasks)
  # ============================================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eu-ai-act-celery-worker
    command: celery -A backend.core.celery_app worker --loglevel=info
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=eu_ai_act_db
      - POSTGRES_USER=ai_compliance_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - eu-ai-act-network
    restart: unless-stopped

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: eu-ai-act-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - eu-ai-act-network
    restart: unless-stopped

  # ============================================================================
  # Prometheus (Monitoring)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: eu-ai-act-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - eu-ai-act-network
    restart: unless-stopped

  # ============================================================================
  # Grafana (Visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: eu-ai-act-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - eu-ai-act-network
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  eu-ai-act-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local

